<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unwanted Penguin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050d1a; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #aee8ff;
      font-family: monospace;
      font-size: 18px;
      text-shadow: 0 0 8px #44aaff;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <div id="ui">UNWANTED PENGUIN &mdash; WASD move &nbsp;|&nbsp; L / P jump</div>
  <div style="position:fixed;top:20px;right:24px;display:flex;flex-direction:column;align-items:flex-end;gap:2px;pointer-events:none">
    <div id="killHUD" style="font-family:monospace;font-size:16px;color:#aee8ff;text-shadow:0 0 8px #44aaff">☠ 0</div>
    <div id="timerHUD" style="font-family:monospace;font-size:13px;color:#aee8ff99;text-shadow:0 0 6px #44aaff">⏱ 0:00</div>
  </div>
<div id="coordHUD" style="position:fixed;top:20px;left:16px;font-family:monospace;font-size:13px;color:#668899;pointer-events:none">0, 0</div>
  <div id="playsHUD" style="position:fixed;top:38px;left:16px;font-family:monospace;font-size:11px;color:#446655;pointer-events:none">▶ 0 plays</div>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    setTimeout(() => { document.getElementById('ui').style.opacity = '0'; }, 3000);
    const s = document.createElement('script');
    s.src = 'game.js?t=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
