<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unwanted Penguin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050d1a; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #aee8ff;
      font-family: monospace;
      font-size: 18px;
      text-shadow: 0 0 8px #44aaff;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>
  <div id="ui">UNWANTED PENGUIN &mdash; WASD move &nbsp;|&nbsp; L / P jump</div>
  <div style="position:fixed;top:20px;right:24px;pointer-events:none">
    <div id="killHUD" style="font-family:monospace;font-size:16px;color:#aee8ff;text-shadow:0 0 8px #44aaff;text-align:right">☠ 0</div>
    <div style="font-family:monospace;font-size:10px;color:#6699aa;text-align:right;margin-top:2px">2026-04-18 · 23:15</div>
  </div>
  <div id="timerHUD" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:monospace;font-size:18px;color:#aee8ff;text-shadow:0 0 8px #44aaff;pointer-events:none">⏱ 5:00</div>
  <div id="bossArrow" style="display:none;position:fixed;pointer-events:none;z-index:100;font-size:22px;color:#ff4477;text-shadow:0 0 10px #ff0044;transition:opacity 0.2s">▲</div>
  <div id="bossHUD" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);pointer-events:none;text-align:center;z-index:100">
    <div style="font-family:monospace;font-size:12px;color:#ff4477;text-shadow:0 0 8px #ff0044;letter-spacing:2px;margin-bottom:4px">KRILL</div>
    <div style="width:320px;height:12px;background:#1a0008;border:1px solid #ff4477;border-radius:4px;overflow:hidden">
      <div id="bossBarInner" style="width:100%;height:100%;background:#ff2255;border-radius:4px;transition:width 0.15s"></div>
    </div>
  </div>
<div id="coordHUD" style="position:fixed;top:20px;left:16px;font-family:monospace;font-size:13px;color:#668899;pointer-events:none">0, 0</div>
  <div id="playsHUD" style="position:fixed;top:38px;left:16px;font-family:monospace;font-size:11px;color:#446655;pointer-events:none">▶ 0 plays</div>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    setTimeout(() => { document.getElementById('ui').style.opacity = '0'; }, 3000);
    const s = document.createElement('script');
    s.src = 'game.js?t=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
