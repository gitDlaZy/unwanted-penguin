<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unwanted Penguin — Level 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #020c18; }
    canvas { display: block; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  </style>
</head>
<body>
  <div id="ui" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#aee8ff;font-family:monospace;font-size:18px;text-shadow:0 0 8px #44aaff;pointer-events:none;opacity:1;transition:opacity 1s ease">
    LEVEL 2 — THE SUNKEN SEA &nbsp;|&nbsp; WASD move &nbsp;|&nbsp; P jump &nbsp;|&nbsp; L power-up
  </div>
  <div style="position:fixed;top:20px;right:24px;pointer-events:none">
    <div id="killHUD" style="font-family:monospace;font-size:16px;color:#aee8ff;text-shadow:0 0 8px #44aaff;text-align:right">☠ 0</div>
  </div>
  <div id="timerHUD" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:monospace;font-size:18px;color:#aee8ff;text-shadow:0 0 8px #44aaff;pointer-events:none">⏱ 5:00</div>
  <div id="bossArrow" style="display:none;position:fixed;pointer-events:none;z-index:100;font-size:33px;color:#ff4477;text-shadow:0 0 10px #ff0044;transition:opacity 0.2s">▲</div>
  <div id="bossHUD" style="display:none;position:fixed;top:56px;left:50%;transform:translateX(-50%);pointer-events:none;text-align:center;z-index:100">
    <div style="font-family:monospace;font-size:12px;color:#ff4477;text-shadow:0 0 8px #ff0044;letter-spacing:2px;margin-bottom:4px">BOSS</div>
    <div style="width:320px;height:12px;background:#1a0008;border:1px solid #ff4477;border-radius:4px;overflow:hidden">
      <div id="bossBarInner" style="width:100%;height:100%;background:#ff2255;border-radius:4px;transition:width 0.15s"></div>
    </div>
  </div>
  <div id="coordHUD" style="position:fixed;top:20px;left:16px;font-family:monospace;font-size:13px;color:#668899;pointer-events:none">0, 0</div>
  <div id="fpsHUD"   style="position:fixed;top:38px;left:16px;font-family:monospace;font-size:13px;color:#668899;pointer-events:none">-- fps</div>
  <div id="levelTag" style="position:fixed;top:56px;left:16px;font-family:monospace;font-size:13px;color:#aee8ff;pointer-events:none">⚓ LEVEL 2</div>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store">
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const bgm = window.bgm = new Audio('sounds/Cowboy%20Bebop%20-%20Opening%20Tank.mp3');
    bgm.loop   = false;
    bgm.volume = parseFloat(localStorage.getItem('bgmVolume') ?? '0.4');

    const volWrap = document.createElement('div');
    volWrap.style.cssText = 'position:fixed;bottom:16px;right:16px;display:flex;align-items:center;gap:6px;font-family:monospace;font-size:12px;color:#668899;pointer-events:auto;z-index:50';
    volWrap.innerHTML = `🎵 <input id="volSlider" type="range" min="0" max="1" step="0.05" value="${bgm.volume}" style="width:72px;accent-color:#44aaff;cursor:pointer">`;
    document.body.appendChild(volWrap);
    document.getElementById('volSlider').addEventListener('input', e => {
      bgm.volume = parseFloat(e.target.value);
      localStorage.setItem('bgmVolume', bgm.volume);
    });

    if (sessionStorage.getItem('bgmAutoStart')) {
      sessionStorage.removeItem('bgmAutoStart');
      bgm.play().catch(() => {});
    }
    setTimeout(() => { document.getElementById('ui').style.opacity = '0'; }, 3000);
    const s = document.createElement('script');
    s.src = 'level2.js?t=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
